name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── Stage 1: Quality Gates (all parallel) ────────────────────

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --all-extras

      - name: Format check
        run: uv run ruff format --check backend/

      - name: Lint
        run: uv run ruff check backend/

      - name: Type check
        run: uv run mypy backend/agents/ backend/interfaces/ backend/domain/ backend/infrastructure/ backend/clients/

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

  db-validate:
    name: DB Migrations (dry-run)
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migrations
        if: env.SUPABASE_DB_URL != ''
        run: |
          supabase migration list --db-url "$SUPABASE_DB_URL"
          supabase db push --dry-run --db-url "$SUPABASE_DB_URL"

  # ── Stage 2: Tests + Build (parallel, gated by Stage 1) ───

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --all-extras

      - name: Unit tests (coverage >= 80%)
        run: uv run pytest backend/tests/unit/ -v --cov --cov-report=xml --cov-fail-under=80

      - name: Integration tests (testcontainer)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: >-
          uv run pytest backend/tests/integration/ -v --no-cov
          -k "not test_frontend_contracts and not test_e2e_smoke"
        env:
          ZETA_API_KEY: ${{ secrets.ZETA_API_KEY }}

      - name: Verify imports
        run: |
          uv run python -c "from backend.interfaces.fastapi_service import create_fastapi_app; print('fastapi OK')"
          uv run python -c "from backend.domain.entities import Point; print('domain OK')"
          uv run python -c "from backend.agents.pilgrimage_runner import run_pilgrimage_agent; print('pilgrimage_agent OK')"

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: frontend-quality
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Unit tests (coverage gate)
        run: npx vitest run --coverage
        working-directory: frontend

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-quality
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Build static export
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-out
          path: frontend/out
          retention-days: 1

  agent-eval:
    name: Agent Eval (546 cases)
    runs-on: ubuntu-latest
    needs: backend-quality
    # Disabled: costs ~$10/run. Enable per-release or manually.
    if: false
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --all-extras

      - name: Run agent eval
        run: uv run pytest backend/tests/eval/test_agent_eval.py -v -m integration --no-cov -x
        env:
          EVAL_MODEL: openai:deepseek-v4-pro@https://api.deepseek.com
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Run translation eval
        run: uv run pytest backend/tests/eval/test_translation.py -v -m integration --no-cov -x
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

  # ── Stage 3: Deploy (tag-triggered, all tests green) ───────

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, frontend-build, db-validate]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      actions: read
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: frontend-out
          path: frontend/out

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply database migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Deploy via Wrangler (edge + container)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.79.0"
          command: deploy
          secrets: |
            SUPABASE_URL
            SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
            SUPABASE_DB_URL
            GEMINI_API_KEY
            ZETA_API_KEY
            OPENAI_COMPAT_BASE_URL
            OPENAI_COMPAT_API_KEY
            GOOGLE_MAPS_API_KEY
            LOGFIRE_TOKEN
            CORS_ALLOWED_ORIGIN
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZETA_API_KEY: ${{ secrets.ZETA_API_KEY }}
          OPENAI_COMPAT_BASE_URL: ${{ vars.OPENAI_COMPAT_BASE_URL || 'https://api.univibe.cc/openai' }}
          OPENAI_COMPAT_API_KEY: ${{ secrets.OPENAI_COMPAT_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}
          CORS_ALLOWED_ORIGIN: ${{ secrets.CORS_ALLOWED_ORIGIN }}

  # ── Stage 4: Post-deploy smoke test (after successful deploy) ──

  smoke-test:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --all-extras

      - name: Run E2E smoke tests
        run: >-
          uv run pytest
          backend/tests/integration/test_e2e_smoke.py
          backend/tests/integration/test_frontend_contracts.py
          -v --no-cov
        env:
          SEICHI_API_URL: ${{ secrets.SEICHI_API_URL }}
          SEICHI_API_KEY: ${{ secrets.SEICHI_API_KEY }}
