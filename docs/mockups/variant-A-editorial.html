<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Variant A — Editorial Atelier</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600&display=swap");
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --brand:oklch(58% 0.19 28);--brand-soft:oklch(94% 0.02 25);
  --int:oklch(60% 0.148 240);--int-fg:oklch(99% 0.004 220);--int-soft:oklch(93% 0.025 240);
  --bg:oklch(98% 0.008 218);--fg:oklch(20% 0.025 238);--card:oklch(95% 0.012 215);
  --muted:oklch(91% 0.016 218);--muted-fg:oklch(45% 0.032 228);--border:oklch(85% 0.022 222);
}
html,body{height:100%;overflow:hidden}
body{font-family:"Noto Sans SC",system-ui,sans-serif;font-weight:300;background:var(--bg);color:var(--fg)}

.shell{display:flex;height:100vh}

/* Sidebar */
.sb{width:200px;min-width:200px;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;background:var(--bg)}
.sb-logo{display:flex;align-items:center;gap:10px;padding:0 16px 20px}
.sb-logo svg{flex-shrink:0}
.sb-logo span{font-family:"Shippori Mincho B1",serif;font-size:14px;font-weight:700;color:var(--fg)}
.sb-nav{display:flex;flex-direction:column;gap:2px;padding:0 8px;flex:1}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;color:var(--muted-fg);cursor:pointer;height:44px;transition:background .15s}
.sb-item:hover{background:var(--muted)}
.sb-item.active{background:var(--int-soft);color:var(--int);font-weight:500}
.sb-icon{width:18px;height:18px;border-radius:4px;background:var(--muted);flex-shrink:0}
.sb-item.active .sb-icon{background:oklch(80% 0.06 240)}
.sb-spacer{flex:1}
.sb-collapse{padding:8px 16px;font-size:11px;color:var(--muted-fg);cursor:pointer;text-align:center}

/* Content */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

.hdr{padding:28px 32px 12px;display:flex;align-items:baseline;gap:16px}
.hdr h1{font-family:"Shippori Mincho B1",serif;font-size:28px;font-weight:700}
.hdr .meta{font-size:14px;color:var(--muted-fg)}
.hdr .toggle{margin-left:auto;display:flex;background:var(--muted);border-radius:8px;padding:2px;gap:2px}
.toggle-btn{padding:4px 12px;border:none;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:var(--muted-fg)}
.toggle-btn.active{background:var(--bg);color:var(--fg);box-shadow:0 1px 3px oklch(20% 0.02 238/.06)}

.filters{display:flex;gap:6px;padding:0 32px 20px}
.chip{padding:4px 14px;border-radius:14px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--bg);color:var(--muted-fg);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--int)}
.chip.active{background:var(--int);color:var(--int-fg);border-color:var(--int)}

/* Grid — EDITORIAL: 3 cols, generous gap */
.grid-wrap{flex:1;overflow-y:auto;padding:0 32px 120px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .2s cubic-bezier(.16,1,.3,1),box-shadow .2s}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px oklch(20% 0.02 238/.08)}
.card.hero{grid-column:1/3;grid-row:1/3}
.card img{width:100%;height:100%;object-fit:cover;display:block;aspect-ratio:4/3}
.card.hero img{aspect-ratio:auto;height:100%}
.card-overlay{position:absolute;bottom:0;left:0;right:0;padding:12px 14px;background:linear-gradient(transparent,oklch(20% 0.02 238/.55));display:flex;align-items:flex-end;justify-content:space-between}
.card-name{font-size:14px;font-weight:500;color:white}
.card-ep{font-size:11px;color:rgba(255,255,255,.7)}
.card-check{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;background:var(--int);color:white;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.8);transition:all .15s}
.card.selected .card-check{opacity:1;transform:scale(1)}

/* Selection bar */
.selbar{position:absolute;bottom:52px;left:0;right:0;display:flex;align-items:center;gap:12px;padding:10px 32px;background:var(--card);border-top:1px solid var(--border);z-index:5}
.selbar-count{font-size:14px;font-weight:500}
.selbar-btn{margin-left:auto;padding:8px 24px;border-radius:20px;border:none;background:var(--int);color:var(--int-fg);font-size:14px;font-weight:600;cursor:pointer;height:36px}
.selbar-clear{font-size:13px;color:var(--muted-fg);cursor:pointer;background:none;border:none;margin-left:8px}

/* Chat toggle */
.chat-toggle{position:absolute;bottom:12px;left:32px;display:flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;background:var(--card);border:1px solid var(--border);font-size:13px;font-weight:500;color:var(--fg);cursor:pointer;box-shadow:0 2px 8px oklch(20% 0.02 238/.06);z-index:5;transition:transform .15s}
.chat-toggle:hover{transform:translateY(-1px)}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="shell">
  <aside class="sb">
    <div class="sb-logo">
      <svg viewBox="0 0 72 72" width="28" height="28" fill="none">
        <rect x="12" y="16" width="48" height="5" rx="2.5" fill="oklch(58% 0.19 28)"/>
        <rect x="8" y="14" width="56" height="3" rx="1.5" fill="oklch(58% 0.19 28)"/>
        <rect x="16" y="21" width="5" height="35" rx="1" fill="oklch(58% 0.19 28)"/>
        <rect x="51" y="21" width="5" height="35" rx="1" fill="oklch(58% 0.19 28)"/>
        <rect x="12" y="30" width="48" height="3" rx="1.5" fill="oklch(58% 0.19 28)" opacity=".5"/>
        <rect x="2" y="2" width="7" height="1.5" rx=".75" fill="oklch(45% 0.032 228)"/>
        <rect x="2" y="2" width="1.5" height="7" rx=".75" fill="oklch(45% 0.032 228)"/>
        <rect x="63" y="2" width="7" height="1.5" rx=".75" fill="oklch(45% 0.032 228)"/>
        <rect x="68.5" y="2" width="1.5" height="7" rx=".75" fill="oklch(45% 0.032 228)"/>
        <rect x="2" y="68.5" width="7" height="1.5" rx=".75" fill="oklch(45% 0.032 228)"/>
        <rect x="2" y="63" width="1.5" height="7" rx=".75" fill="oklch(45% 0.032 228)"/>
        <rect x="63" y="68.5" width="7" height="1.5" rx=".75" fill="oklch(45% 0.032 228)"/>
        <rect x="68.5" y="63" width="1.5" height="7" rx=".75" fill="oklch(45% 0.032 228)"/>
      </svg>
      <span>聖地巡礼</span>
    </div>
    <nav class="sb-nav">
      <div class="sb-item"><div class="sb-icon"></div>New Chat</div>
      <div class="sb-item active"><div class="sb-icon"></div>Search</div>
      <div class="sb-item"><div class="sb-icon"></div>My Routes</div>
      <div class="sb-item"><div class="sb-icon"></div>Favorites</div>
      <div class="sb-item"><div class="sb-icon"></div>History</div>
      <div class="sb-spacer"></div>
      <div class="sb-item"><div class="sb-icon"></div>Settings</div>
    </nav>
    <div class="sb-collapse">‹ Collapse</div>
  </aside>

  <main class="content">
    <div class="hdr">
      <h1>響け！ユーフォニアム</h1>
      <span class="meta">156 spots · 宇治市, 京都</span>
      <div class="toggle">
        <button class="toggle-btn active">Grid</button>
        <button class="toggle-btn">Map</button>
      </div>
    </div>

    <div class="filters">
      <span class="chip active">All</span>
      <span class="chip">EP 1-4</span>
      <span class="chip">EP 5-8</span>
      <span class="chip">EP 9-12</span>
      <span class="chip">EP 13-16</span>
    </div>

    <div class="grid-wrap">
      <div class="grid">
        <div class="card hero selected">
          <img src="https://image.anitabi.cn/points/115908/qys7fu.jpg?plan=h160" alt="">
          <div class="card-overlay"><span class="card-name">京都コンサートホール</span><span class="card-ep">EP 1</span></div>
          <div class="card-check">✓</div>
        </div>
        <div class="card"><img src="https://image.anitabi.cn/points/115908/7evkbmy2.jpg?plan=h160" alt=""><div class="card-overlay"><span class="card-name">宇治橋</span><span class="card-ep">EP 2</span></div><div class="card-check">✓</div></div>
        <div class="card"><img src="https://image.anitabi.cn/points/115908/7eyih3xg.jpg?plan=h160" alt=""><div class="card-overlay"><span class="card-name">中書島駅</span><span class="card-ep">EP 3</span></div><div class="card-check">✓</div></div>
        <div class="card selected"><img src="https://image.anitabi.cn/points/115908/7evkbmy2.jpg?plan=h160" alt=""><div class="card-overlay"><span class="card-name">平等院表参道</span><span class="card-ep">EP 3</span></div><div class="card-check">✓</div></div>
        <div class="card"><img src="https://image.anitabi.cn/points/115908/qys7fu.jpg?plan=h160" alt=""><div class="card-overlay"><span class="card-name">あじろぎの道</span><span class="card-ep">EP 1</span></div><div class="card-check">✓</div></div>
        <div class="card"><img src="https://image.anitabi.cn/points/115908/7eyih3xg.jpg?plan=h160" alt=""><div class="card-overlay"><span class="card-name">宇治駅前商店街</span><span class="card-ep">EP 4</span></div><div class="card-check">✓</div></div>
        <div class="card selected"><img src="https://image.anitabi.cn/points/115908/7evkbmy2.jpg?plan=h160" alt=""><div class="card-overlay"><span class="card-name">朝霧橋</span><span class="card-ep">EP 5</span></div><div class="card-check">✓</div></div>
        <div class="card"><img src="https://image.anitabi.cn/points/115908/qys7fu.jpg?plan=h160" alt=""><div class="card-overlay"><span class="card-name">興聖寺</span><span class="card-ep">EP 6</span></div><div class="card-check">✓</div></div>
        <div class="card"><img src="https://image.anitabi.cn/points/115908/7eyih3xg.jpg?plan=h160" alt=""><div class="card-overlay"><span class="card-name">莵道高</span><span class="card-ep">EP 1</span></div><div class="card-check">✓</div></div>
      </div>
    </div>

    <div class="selbar">
      <span class="selbar-count">3 spots selected</span>
      <button class="selbar-btn">Plan Route</button>
      <button class="selbar-clear">Clear</button>
    </div>
    <div class="chat-toggle">💬 Chat</div>
  </main>
</div>
</body>
</html>
