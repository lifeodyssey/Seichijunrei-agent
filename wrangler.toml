# Cloudflare Workers + Containers configuration
# https://developers.cloudflare.com/workers/containers/
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN       — Workers:Edit + Containers:Edit + Account:Read
#   CLOUDFLARE_ACCOUNT_ID      — Visible in dashboard URL
#   SUPABASE_URL               — https://<project>.supabase.co
#   SUPABASE_ANON_KEY          — Public anon key
#   SUPABASE_SERVICE_ROLE_KEY  — Service role key
#   SUPABASE_DB_URL            — postgres://...
#   GEMINI_API_KEY
#   LOGFIRE_TOKEN              — logfire.pydantic.dev (optional)

name = "seichijunrei"
compatibility_date = "2025-03-01"
main = "src/worker.js"

[assets]
directory = "./frontend/out"
binding = "ASSETS"
run_worker_first = ["/healthz", "/v1/*"]

[[containers]]
class_name = "RuntimeContainer"
# Local dev: wrangler builds from Dockerfile.
# CI: replaced at deploy time with the GHCR digest.
image = "./Dockerfile"
max_instances = 3

[[durable_objects.bindings]]
name = "CONTAINER"
class_name = "RuntimeContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RuntimeContainer"]
