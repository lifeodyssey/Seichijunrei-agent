<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消歧义 — Seichijunrei</title>
<link rel="stylesheet" href="shared.css">
<style>
.chat-screen{display:flex;flex-direction:column;height:100%;max-width:600px;margin:0 auto;padding:24px 24px 0}
.messages{flex:1;display:flex;flex-direction:column;gap:12px;overflow-y:auto;padding-bottom:16px;justify-content:center}
.clar-cards{display:flex;gap:12px;margin-top:8px}
.clar-card{width:200px;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;background:var(--bg);transition:transform .15s,box-shadow .15s;cursor:pointer}
.clar-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px oklch(20% 0.02 238/.08)}
.clar-card img{width:100%;height:90px;object-fit:cover;display:block}
.clar-card .placeholder{width:100%;height:90px;background:var(--muted);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:20px;color:var(--brand)}
.clar-card-body{padding:10px}
.clar-card-body h4{font-family:var(--font-display);font-size:14px;font-weight:600;margin-bottom:2px}
.clar-card-body p{font-size:12px;color:var(--muted-fg);margin-bottom:8px}
.clar-all{font-size:13px;color:var(--int);background:none;border:none;cursor:pointer;margin-top:8px;padding:0}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sb-logo"><svg viewBox="0 0 72 72" width="28" height="28" fill="none"><rect x="12" y="16" width="48" height="5" rx="2.5" fill="oklch(58% 0.19 28)"/><rect x="8" y="14" width="56" height="3" rx="1.5" fill="oklch(58% 0.19 28)"/><rect x="16" y="21" width="5" height="35" rx="1" fill="oklch(58% 0.19 28)"/><rect x="51" y="21" width="5" height="35" rx="1" fill="oklch(58% 0.19 28)"/><rect x="12" y="30" width="48" height="3" rx="1.5" fill="oklch(58% 0.19 28)" opacity=".5"/></svg></div>
    <button class="sb-btn active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
    <button class="sb-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/></svg></button>
    <button class="sb-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
    <div class="sb-spacer"></div>
    <button class="sb-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/></svg></button>
  </aside>
  <main id="main">
    <div class="chat-screen">
      <div class="messages">
        <div class="bubble-user">涼宮</div>
        <div class="bubble-ai" style="max-width:92%">
          找到两部匹配的作品：
          <div class="clar-cards">
            <a class="clar-card" href="03-results.html" style="text-decoration:none;color:inherit">
              <img src="https://image.anitabi.cn/bangumi/485.jpg" alt="涼宮ハルヒの憂鬱" width="200" height="90">
              <div class="clar-card-body">
                <h4>涼宮ハルヒの憂鬱</h4>
                <p>134 个圣地 · 西宮市</p>
                <span class="btn-o" style="display:inline-block;text-align:center;width:100%">搜索这部</span>
              </div>
            </a>
            <a class="clar-card" href="03-results.html" style="text-decoration:none;color:inherit">
              <div class="placeholder">聖</div>
              <div class="clar-card-body">
                <h4>涼宮ハルヒの消失</h4>
                <p>42 个圣地 · 西宮市</p>
                <span class="btn-o" style="display:inline-block;text-align:center;width:100%">搜索这部</span>
              </div>
            </a>
          </div>
          <button class="clar-all" onclick="location.href='03-results.html'">全部搜索</button>
        </div>
      </div>
      <div class="chat-input">
        <input placeholder="输入消息…" aria-label="输入消息">
        <button aria-label="发送"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>
  </main>
</div>
</body>
</html>
