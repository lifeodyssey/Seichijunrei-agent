<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搜索结果 — Seichijunrei</title>
<link rel="stylesheet" href="shared.css">
<style>
/* Results-specific styles */
.results-content{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Content header */
.content-header{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.content-header img{width:48px;height:64px;border-radius:var(--r-sm);object-fit:cover;flex-shrink:0}
.header-info{flex:1;min-width:0}
.header-info h2{font-size:18px;margin-bottom:2px}
.header-meta{font-size:13px;color:var(--muted-fg)}
.view-toggle{display:flex;gap:4px}
.view-toggle button{padding:6px 14px;border-radius:var(--r-md);border:1px solid var(--border);font-size:12px;font-weight:500;background:var(--bg);color:var(--muted-fg);cursor:pointer}
.view-toggle button.a{background:var(--int);color:var(--int-fg);border-color:var(--int)}

/* Tab bar */
.tab-bar{display:flex;align-items:center;padding:8px 20px;border-bottom:1px solid var(--border);flex-shrink:0;gap:4px}
.tab{padding:6px 14px;border-radius:var(--r-md);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted-fg)}
.tab:hover{background:var(--muted)}
.tab.a{background:var(--int-soft);color:var(--int);font-weight:600}
.tab-stats{margin-left:auto;font-size:12px;color:var(--muted-fg)}

/* Filters */
.filters{display:flex;align-items:center;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.filter-label{font-size:12px;font-weight:500;color:var(--muted-fg);margin-right:4px}

/* Photo grid */
.photo-grid{flex:1;overflow-y:auto;padding:16px 20px;padding-bottom:140px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-content:start}

/* Selection bar */
.selbar{position:fixed;bottom:0;left:60px;right:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;transform:translateY(100%);transition:transform .25s cubic-bezier(.16,1,.3,1);z-index:10;box-shadow:0 -4px 16px oklch(20% 0.02 238/.08)}
.selbar.show{transform:translateY(0)}
.selbar-count{font-size:14px;font-weight:500;flex-shrink:0}
.selbar-input{flex:1;max-width:240px;height:36px;border:1px solid var(--border);border-radius:var(--r-md);padding:0 12px;font-size:13px;background:var(--bg);color:var(--fg)}
.selbar-input::placeholder{color:var(--muted-fg)}
.selbar-spacer{flex:1}
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->

    <button class="sb-btn" aria-label="历史"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/></svg><span class="sb-tip">历史</span></button>

<script>
(function() {
  var grid = document.getElementById('grid');
  var selbar = document.getElementById('selbar');
  var selCount = document.getElementById('sel-count');
  var selCountTab = document.getElementById('sel-count-tab');

  function updateCount() {
    var count = grid.querySelectorAll('.gc.sel').length;
    selCount.textContent = count;
    selCountTab.textContent = count;
    if (count > 0) {
      selbar.classList.add('show');
    } else {
      selbar.classList.remove('show');
    }
  }

  grid.addEventListener('click', function(e) {
    var card = e.target.closest('.gc');
    if (!card) return;
    card.classList.toggle('sel');
    updateCount();
  });

  // Tab toggle
  document.querySelector('.tab-bar').addEventListener('click', function(e) {
    var tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('a'); });
    tab.classList.add('a');
  });

  // Filter chips
  document.querySelector('.filters').addEventListener('click', function(e) {
    var chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('.filters .chip').forEach(function(c) { c.classList.remove('a'); });
    chip.classList.add('a');
  });

  // View toggle
  document.querySelector('.view-toggle').addEventListener('click', function(e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('.view-toggle button').forEach(function(b) { b.classList.remove('a'); });
    btn.classList.add('a');
  });
})();
</script>
