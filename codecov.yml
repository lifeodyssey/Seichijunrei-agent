coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 75%

ignore:
  - "frontend/components/map/**"  # Mapbox GL requires WebGL — untestable in jsdom
  - "frontend/lib/mock-data/**"   # Static test fixtures
  - "frontend/components/ui/**"   # Shadcn generated components
