repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '__snapshots__/'
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix, backend/]
      - id: ruff-format
        args: [backend/]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy backend/agents/ backend/interfaces/ backend/domain/ backend/infrastructure/ backend/clients/
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: frontend-typecheck
        name: frontend typecheck
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false

      - id: frontend-lint
        name: frontend lint
        entry: bash -c 'cd frontend && npx eslint .'
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false

      - id: frontend-test-coverage
        name: frontend tests + coverage (lines>=60%)
        entry: bash -c 'cd frontend && npx vitest run --coverage'
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false

      - id: backend-test-coverage
        name: backend tests + coverage (lines>=80%)
        entry: bash -c 'uv run pytest backend/tests/unit/ -q --cov --cov-fail-under=80'
        language: system
        types: [python]
        pass_filenames: false
