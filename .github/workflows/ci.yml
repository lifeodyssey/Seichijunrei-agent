name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── Stage 1: Quality Gates (all parallel) ────────────────────

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --all-extras

      - name: Format check
        run: uv run ruff format --check backend/

      - name: Lint
        run: uv run ruff check backend/

      - name: Type check
        run: uv run mypy backend/agents/ backend/interfaces/ backend/domain/ backend/infrastructure/ backend/clients/

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

  db-validate:
    name: DB Migrations (dry-run)
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migrations
        if: env.SUPABASE_DB_URL != ''
        run: |
          supabase migration list --db-url "$SUPABASE_DB_URL"
          supabase db push --dry-run --db-url "$SUPABASE_DB_URL"

  # ── Stage 2: Tests + Build (parallel, gated by Stage 1) ───

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-quality
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --all-extras

      - name: Unit tests (coverage >= 70%)
        run: uv run pytest backend/tests/unit/ -v --cov --cov-report=xml --cov-fail-under=70

      - name: Integration tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: uv run pytest backend/tests/integration/ -v --no-cov
        continue-on-error: true
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Verify imports
        run: |
          uv run python -c "from backend.agents.pipeline import run_pipeline; print('pipeline OK')"
          uv run python -c "from backend.interfaces.http_service import create_http_app; print('http OK')"
          uv run python -c "from backend.domain.entities import Point; print('domain OK')"

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-quality
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Build static export
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-out
          path: frontend/out
          retention-days: 1

  eval:
    name: Eval (Gemini)
    runs-on: ubuntu-latest
    needs: backend-quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - run: uv python install ${{ env.PYTHON_VERSION }}

      - run: uv sync --all-extras

      - name: Run evals
        run: uv run pytest backend/tests/eval/ -v -m integration --no-cov
        env:
          EVAL_MODEL: gemini-2.5-flash-lite
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  # ── Stage 3: Deploy (auto on main, all tests green) ───────

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, db-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      actions: read
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: frontend-out
          path: frontend/out

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply database migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.79.0"
          command: deploy
          secrets: |
            SUPABASE_URL
            SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
            SUPABASE_DB_URL
            GEMINI_API_KEY
            GOOGLE_MAPS_API_KEY
            LOGFIRE_TOKEN
            CORS_ALLOWED_ORIGIN
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}
          CORS_ALLOWED_ORIGIN: ${{ secrets.CORS_ALLOWED_ORIGIN }}
