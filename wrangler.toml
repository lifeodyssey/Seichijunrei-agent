# Cloudflare Workers + Containers configuration
# https://developers.cloudflare.com/workers/containers/
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN       — Wrangler deploy auth
#   CLOUDFLARE_ACCOUNT_ID      — Cloudflare account target
#
# Worker-only runtime secrets (used by worker/worker.js at the edge):
#   SUPABASE_URL               — https://<project>.supabase.co
#   SUPABASE_ANON_KEY          — Public anon key for JWT validation
#   SUPABASE_SERVICE_ROLE_KEY  — Service role for hashed API-key lookup
#
# Container runtime secrets (explicitly allowlisted in worker/worker.js):
#   SUPABASE_DB_URL            — postgres://... for asyncpg
#   GEMINI_API_KEY             — primary planner model provider key
#   OPENAI_COMPAT_BASE_URL     — custom OpenAI-compatible fallback endpoint
#   OPENAI_COMPAT_API_KEY      — custom OpenAI-compatible fallback provider key
#   GOOGLE_MAPS_API_KEY        — optional geocoding provider key
#   LOGFIRE_TOKEN              — optional observability token
#   CORS_ALLOWED_ORIGIN        — backend CORS allowlist
#
# Frontend build-time envs are injected by GitHub Actions, not wrangler.toml:
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#
# Future optional container env (documented only until backend wiring exists):
#   CLOUDFLARE_AI_GATEWAY_URL

name = "seichijunrei"
compatibility_date = "2025-03-01"
main = "worker/worker.js"

routes = [
  { pattern = "seichijunrei.zhenjia.org/*", zone_name = "zhenjia.org" }
]

[assets]
directory = "./frontend/out"
binding = "ASSETS"
run_worker_first = ["/healthz", "/v1/*", "/img/*"]

[[containers]]
class_name = "RuntimeContainer"
# Local dev and CI both build from the checked-in Dockerfile.
# `wrangler deploy` uploads the image to Cloudflare's registry; this repo does
# not hand off a GHCR image digest.
image = "./Dockerfile"
max_instances = 3

[[durable_objects.bindings]]
name = "CONTAINER"
class_name = "RuntimeContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RuntimeContainer"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
